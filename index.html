<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Alan's Robot Lab 🤖</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════
   VARIABLES & RESET
═══════════════════════════════════════════ */
:root {
  --orange:     #F97316;
  --orange-d:   #EA6700;
  --orange-l:   #FFF3E9;
  --navy:       #0F2240;
  --navy-m:     #1A3A6B;
  --navy-l:     #E8EDF5;
  --red:        #CC1F1F;
  --red-l:      #FFF0F0;
  --black:      #0D0D0D;
  --white:      #FFFFFF;
  --bg:         #F5F7FA;
  --card:       #FFFFFF;
  --text:       #111827;
  --text-s:     #6B7280;
  --border:     #E5E7EB;
  --shadow:     0 2px 12px rgba(15,34,64,.10);
  --shadow-lg:  0 8px 32px rgba(15,34,64,.15);
  --radius:     14px;
  --radius-sm:  8px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overscroll-behavior:none;}
button{font-family:'Nunito',sans-serif;cursor:pointer;}
input,textarea,select{font-family:'Nunito',sans-serif;}
img{max-width:100%;}

/* ═══════════════════════════════════════════
   LAYOUT HELPERS
═══════════════════════════════════════════ */
.screen{display:none;min-height:100vh;flex-direction:column;}
.screen.active{display:flex;}
.container{width:100%;max-width:480px;margin:0 auto;padding:0 16px;}
.spacer{flex:1;}

/* ═══════════════════════════════════════════
   TOP BARS
═══════════════════════════════════════════ */
.topbar{background:var(--navy);color:var(--white);padding:14px 16px;position:sticky;top:0;z-index:100;
  display:flex;align-items:center;gap:12px;box-shadow:0 2px 8px rgba(0,0,0,.25);}
.topbar-title{font-family:'Orbitron',monospace;font-size:13px;font-weight:700;letter-spacing:1px;flex:1;}
.topbar-sub{font-size:10px;color:#8899BB;margin-top:2px;}
.topbar-btn{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);border-radius:var(--radius-sm);
  color:var(--white);padding:7px 13px;font-size:11px;font-weight:700;letter-spacing:.5px;}
.topbar-btn:hover{background:rgba(255,255,255,.18);}
.progress-strip{height:4px;background:rgba(255,255,255,.12);}
.progress-fill{height:4px;background:var(--orange);transition:width .4s ease;border-radius:2px;}

/* ═══════════════════════════════════════════
   HOME SCREEN
═══════════════════════════════════════════ */
.home-hero{background:linear-gradient(145deg,var(--navy) 0%,var(--navy-m) 100%);
  padding:40px 20px 36px;text-align:center;position:relative;overflow:hidden;}
.home-hero::before{content:'';position:absolute;inset:0;
  background:radial-gradient(circle at 80% 20%,rgba(249,115,22,.18) 0%,transparent 60%),
              radial-gradient(circle at 10% 80%,rgba(204,31,31,.12) 0%,transparent 50%);}
.hero-robot{font-size:60px;margin-bottom:12px;position:relative;z-index:1;animation:float 3s ease-in-out infinite;}
@keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-8px);}}
.hero-name{font-family:'Orbitron',monospace;font-size:22px;font-weight:900;color:var(--white);
  position:relative;z-index:1;letter-spacing:2px;}
.hero-name span{color:var(--orange);}
.hero-sub{font-size:12px;color:#8899CC;margin-top:6px;position:relative;z-index:1;letter-spacing:2px;}
.hero-stats{display:flex;justify-content:center;gap:10px;margin-top:18px;position:relative;z-index:1;}
.hero-stat{background:rgba(255,255,255,.08);border:1px solid rgba(249,115,22,.25);
  border-radius:20px;padding:5px 14px;font-size:11px;color:#AABBD0;font-weight:700;}
.hero-stat b{color:var(--orange);}

.role-cards{padding:20px 16px;display:flex;flex-direction:column;gap:12px;}
.role-card{background:var(--card);border-radius:var(--radius);padding:20px;border:2px solid var(--border);
  display:flex;gap:14px;align-items:center;box-shadow:var(--shadow);transition:all .2s;}
.role-card:hover,.role-card:active{transform:translateY(-2px);box-shadow:var(--shadow-lg);}
.role-card.student{border-left:5px solid var(--orange);}
.role-card.parent{border-left:5px solid var(--navy);}
.role-icon{font-size:40px;flex-shrink:0;}
.role-title{font-weight:800;font-size:16px;margin-bottom:3px;}
.role-desc{font-size:12px;color:var(--text-s);line-height:1.5;}
.role-card.student .role-title{color:var(--orange-d);}
.role-card.parent .role-title{color:var(--navy);}

/* ═══════════════════════════════════════════
   MODULE TABS (horizontal scroll)
═══════════════════════════════════════════ */
.mod-tabs{background:var(--white);border-bottom:2px solid var(--border);
  display:flex;overflow-x:auto;scrollbar-width:none;position:sticky;top:62px;z-index:90;}
.mod-tabs::-webkit-scrollbar{display:none;}
.mod-tab{padding:10px 16px;min-width:70px;text-align:center;border:none;
  background:transparent;color:var(--text-s);font-size:9px;font-weight:700;
  letter-spacing:.5px;flex-shrink:0;border-bottom:3px solid transparent;
  transition:all .2s;font-family:'Nunito',sans-serif;}
.mod-tab.active{color:var(--orange);border-bottom-color:var(--orange);background:var(--orange-l);}
.mod-tab.locked{color:#CCC;cursor:not-allowed;}
.mod-tab .tab-emoji{display:block;font-size:18px;margin-bottom:2px;}
.mod-tab .tab-count{display:block;font-size:8px;margin-top:2px;}
.tab-lock{display:block;font-size:14px;margin-bottom:2px;}

/* ═══════════════════════════════════════════
   SECTION TABS (Module | Bitácora)
═══════════════════════════════════════════ */
.section-tabs{display:flex;background:var(--white);border-bottom:2px solid var(--border);}
.section-tab{flex:1;padding:12px;border:none;background:transparent;
  font-weight:700;font-size:12px;color:var(--text-s);border-bottom:3px solid transparent;
  transition:all .2s;font-family:'Nunito',sans-serif;}
.section-tab.active{color:var(--orange);border-bottom-color:var(--orange);}

/* ═══════════════════════════════════════════
   CARDS / STEPS
═══════════════════════════════════════════ */
.page-body{padding:16px;display:flex;flex-direction:column;gap:14px;}
.card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;border:1.5px solid var(--border);}
.card-head{padding:14px 16px;border-bottom:1.5px solid var(--border);display:flex;gap:12px;align-items:flex-start;}
.card-head.done{background:linear-gradient(90deg,var(--orange-l),var(--white));}
.step-circle{width:32px;height:32px;border-radius:50%;background:var(--orange-l);
  color:var(--orange);display:flex;align-items:center;justify-content:center;
  font-weight:900;font-size:13px;flex-shrink:0;border:2px solid var(--orange);}
.step-circle.done{background:var(--orange);color:var(--white);}
.step-label{font-size:9px;color:var(--orange);font-weight:800;letter-spacing:2px;margin-bottom:2px;}
.step-title{font-weight:800;font-size:14px;color:var(--text);}
.step-title.done{color:var(--orange-d);}
.card-body{padding:14px 16px;}
.step-text{font-size:13px;color:#374151;line-height:1.8;margin-bottom:14px;white-space:pre-line;}

/* TIP & ACTION boxes */
.tip-box{background:var(--orange-l);border-left:4px solid var(--orange);
  border-radius:0 var(--radius-sm) var(--radius-sm) 0;padding:10px 13px;
  margin-bottom:10px;display:flex;gap:10px;font-size:12px;color:var(--orange-d);line-height:1.6;font-weight:600;}
.action-box{background:var(--navy-l);border-left:4px solid var(--navy);
  border-radius:0 var(--radius-sm) var(--radius-sm) 0;padding:10px 13px;
  margin-bottom:14px;display:flex;gap:10px;font-size:12px;color:var(--navy);line-height:1.6;font-weight:600;}
.warn-box{background:var(--red-l);border-left:4px solid var(--red);
  border-radius:0 var(--radius-sm) var(--radius-sm) 0;padding:10px 13px;
  font-size:12px;color:var(--red);line-height:1.6;font-weight:700;margin-bottom:14px;}

/* ═══════════════════════════════════════════
   IMAGE SLOTS
═══════════════════════════════════════════ */
.img-slot{border:2px dashed var(--border);border-radius:var(--radius-sm);
  overflow:hidden;margin-bottom:14px;background:var(--bg);}
.img-slot img{width:100%;display:block;}
.img-placeholder{padding:20px;text-align:center;}
.img-placeholder .ph-icon{font-size:28px;margin-bottom:4px;}
.img-placeholder p{font-size:11px;color:#9CA3AF;}

/* ═══════════════════════════════════════════
   BUTTONS
═══════════════════════════════════════════ */
.btn{display:block;width:100%;padding:13px 16px;border-radius:var(--radius-sm);
  font-weight:800;font-size:13px;letter-spacing:.5px;border:none;transition:all .2s;}
.btn-orange{background:var(--orange);color:var(--white);}
.btn-orange:hover,.btn-orange:active{background:var(--orange-d);transform:translateY(-1px);}
.btn-navy{background:var(--navy);color:var(--white);}
.btn-navy:hover{background:var(--navy-m);}
.btn-outline{background:transparent;color:var(--orange);border:2px solid var(--orange);}
.btn-outline-navy{background:transparent;color:var(--navy);border:2px solid var(--navy);}
.btn-danger{background:var(--red);color:var(--white);}
.btn-ghost{background:transparent;color:var(--text-s);border:1.5px solid var(--border);}
.btn-done{background:#D1FAE5;color:#065F46;border:none;}
.btn-done:hover{background:#A7F3D0;}
.btn-sm{padding:8px 14px;font-size:11px;border-radius:6px;}

/* ═══════════════════════════════════════════
   COMPLETION BANNER
═══════════════════════════════════════════ */
.completion-banner{background:linear-gradient(135deg,var(--orange),var(--red));
  border-radius:var(--radius);padding:20px;text-align:center;color:var(--white);}
.completion-banner .cb-emoji{font-size:36px;margin-bottom:8px;}
.completion-banner h3{font-family:'Orbitron',monospace;font-size:15px;font-weight:900;margin-bottom:6px;}
.completion-banner p{font-size:12px;opacity:.9;line-height:1.6;}

/* ═══════════════════════════════════════════
   PIN SCREEN
═══════════════════════════════════════════ */
.pin-screen{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 16px;gap:20px;}
.pin-dots{display:flex;gap:12px;}
.pin-dot{width:48px;height:56px;background:var(--white);border:2px solid var(--border);
  border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;
  font-size:24px;font-weight:900;box-shadow:var(--shadow);}
.pin-dot.filled{border-color:var(--orange);color:var(--orange);}
.pin-dot.error{border-color:var(--red);animation:shake .3s ease;}
@keyframes shake{0%,100%{transform:translateX(0);}25%{transform:translateX(-6px);}75%{transform:translateX(6px);}}
.pin-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:220px;}
.pin-key{padding:15px;background:var(--white);border:1.5px solid var(--border);
  border-radius:var(--radius-sm);font-size:20px;font-weight:800;color:var(--navy);
  box-shadow:var(--shadow);transition:all .1s;}
.pin-key:active{background:var(--navy-l);transform:scale(.95);}
.pin-key.empty{background:transparent;border-color:transparent;box-shadow:none;cursor:default;}
.pin-key.del{color:var(--red);}
.pin-error{font-size:12px;color:var(--red);font-weight:700;}
.pin-hint{font-size:11px;color:var(--text-s);}

/* ═══════════════════════════════════════════
   PARENT TABS
═══════════════════════════════════════════ */
.parent-tabs{display:flex;background:var(--white);border-bottom:2px solid var(--border);overflow-x:auto;scrollbar-width:none;}
.parent-tabs::-webkit-scrollbar{display:none;}
.parent-tab{padding:12px 16px;min-width:80px;text-align:center;border:none;background:transparent;
  font-size:10px;font-weight:800;color:var(--text-s);border-bottom:3px solid transparent;
  letter-spacing:.5px;flex-shrink:0;font-family:'Nunito',sans-serif;transition:all .2s;}
.parent-tab.active{color:var(--navy);border-bottom-color:var(--navy);background:var(--navy-l);}

/* ═══════════════════════════════════════════
   UNLOCK CARDS
═══════════════════════════════════════════ */
.unlock-card{background:var(--card);border-radius:var(--radius);padding:14px 16px;
  border:2px solid var(--border);box-shadow:var(--shadow);display:flex;
  justify-content:space-between;align-items:center;gap:12px;}
.unlock-card.active-mod{border-color:var(--orange);background:var(--orange-l);}
.unlock-card.done-mod{border-color:#10B981;background:#ECFDF5;}
.uc-info{}
.uc-badge{font-size:9px;font-weight:800;letter-spacing:1.5px;margin-bottom:3px;}
.uc-title{font-weight:800;font-size:13px;}
.uc-progress{font-size:11px;color:var(--text-s);margin-top:2px;}
.uc-btn{flex-shrink:0;}
.active-tag{background:var(--orange);color:var(--white);border-radius:20px;
  padding:5px 12px;font-size:10px;font-weight:800;letter-spacing:.5px;}
.done-tag{background:#10B981;color:var(--white);border-radius:20px;
  padding:5px 12px;font-size:10px;font-weight:800;}
.locked-tag{background:#F3F4F6;color:#9CA3AF;border-radius:20px;
  padding:5px 12px;font-size:10px;font-weight:800;}

/* ═══════════════════════════════════════════
   PROGRESS BAR
═══════════════════════════════════════════ */
.prog-bar-wrap{margin-top:8px;}
.prog-bar-track{background:#E5E7EB;border-radius:4px;height:6px;}
.prog-bar-fill{height:6px;border-radius:4px;transition:width .4s ease;}

/* ═══════════════════════════════════════════
   STATS CARD
═══════════════════════════════════════════ */
.stats-card{background:linear-gradient(135deg,var(--navy),var(--navy-m));
  border-radius:var(--radius);padding:20px;color:var(--white);text-align:center;box-shadow:var(--shadow-lg);}
.stats-number{font-family:'Orbitron',monospace;font-size:36px;font-weight:900;color:var(--orange);}
.stats-label{font-size:12px;color:#8899CC;margin-top:4px;}
.stats-pct{font-size:11px;color:var(--orange);margin-top:6px;font-weight:700;}

/* ═══════════════════════════════════════════
   BITACORA
═══════════════════════════════════════════ */
.bita-form{background:var(--card);border-radius:var(--radius);overflow:hidden;border:2px solid var(--orange);}
.bita-form-head{background:var(--orange);padding:12px 16px;color:var(--white);
  font-weight:800;font-size:12px;letter-spacing:1px;}
.bita-form-body{padding:16px;}
.field-label{font-size:10px;font-weight:800;color:var(--navy);letter-spacing:1px;margin-bottom:6px;}
.field-input{width:100%;background:var(--bg);border:1.5px solid var(--border);
  border-radius:var(--radius-sm);padding:10px 13px;color:var(--text);font-size:13px;
  margin-bottom:14px;outline:none;transition:border-color .2s;}
.field-input:focus{border-color:var(--orange);}
textarea.field-input{resize:none;height:80px;line-height:1.6;}
select.field-input{appearance:none;cursor:pointer;}
.photo-drop{width:100%;min-height:100px;background:var(--bg);border:2px dashed var(--border);
  border-radius:var(--radius-sm);display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:6px;cursor:pointer;
  margin-bottom:14px;transition:all .2s;padding:16px;}
.photo-drop:active,.photo-drop:hover{border-color:var(--orange);background:var(--orange-l);}
.photo-drop .pd-icon{font-size:28px;}
.photo-drop p{font-size:11px;color:var(--text-s);font-weight:600;}
.mood-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px;}
.mood-btn{padding:8px 14px;background:var(--bg);border:2px solid var(--border);
  border-radius:20px;font-size:16px;transition:all .2s;}
.mood-btn.selected{background:var(--orange-l);border-color:var(--orange);transform:scale(1.15);}
.bita-entry{background:var(--card);border-radius:var(--radius);overflow:hidden;
  box-shadow:var(--shadow);border:1.5px solid var(--border);}
.bita-entry-head{padding:10px 14px;display:flex;justify-content:space-between;align-items:center;border-bottom:1.5px solid var(--border);}
.bita-mod-tag{border-radius:20px;padding:4px 12px;font-size:10px;font-weight:800;}
.bita-date{font-size:10px;color:var(--text-s);}
.bita-entry-title{padding:10px 14px 4px;font-weight:800;font-size:14px;}
.bita-entry-note{padding:4px 14px 10px;font-size:12px;color:var(--text-s);line-height:1.7;}
.bita-entry-mood{padding:6px 14px 12px;font-size:18px;}

/* ═══════════════════════════════════════════
   LOADING OVERLAY
═══════════════════════════════════════════ */
.loading-overlay{position:fixed;inset:0;background:rgba(15,34,64,.6);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  z-index:999;gap:12px;}
.loading-spinner{width:44px;height:44px;border:4px solid rgba(249,115,22,.3);
  border-top-color:var(--orange);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-text{color:var(--white);font-weight:700;font-size:13px;}

/* ═══════════════════════════════════════════
   TOAST
═══════════════════════════════════════════ */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);
  background:var(--navy);color:var(--white);padding:12px 20px;border-radius:30px;
  font-size:13px;font-weight:700;z-index:1000;opacity:0;transition:all .3s;
  white-space:nowrap;box-shadow:var(--shadow-lg);}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.orange{background:var(--orange);}
.toast.green{background:#059669;}
.toast.red{background:var(--red);}

/* ═══════════════════════════════════════════
   MATERIALS CHIPS
═══════════════════════════════════════════ */
.chip-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px;}
.chip{background:var(--navy-l);color:var(--navy);border-radius:20px;
  padding:5px 12px;font-size:11px;font-weight:700;border:1px solid #CBD5E8;}

/* ═══════════════════════════════════════════
   UTILITY
═══════════════════════════════════════════ */
.hidden{display:none!important;}
.flex-row{display:flex;gap:8px;}
.flex-row .btn{flex:1;}
.section-title{font-size:10px;font-weight:800;letter-spacing:2px;color:var(--text-s);
  margin-bottom:12px;text-transform:uppercase;}
.mt-8{margin-top:8px;}
.mt-16{margin-top:16px;}
.info-box{background:var(--navy-l);border-radius:var(--radius-sm);padding:12px 14px;
  font-size:12px;color:var(--navy-m);line-height:1.7;font-weight:600;}
.info-box strong{color:var(--navy);}
</style>
</head>
<body>

<!-- ════════════════════════════════════════
     LOADING OVERLAY
════════════════════════════════════════ -->
<div class="loading-overlay" id="loading">
  <div class="loading-spinner"></div>
  <div class="loading-text">Cargando Robot Lab...</div>
</div>

<!-- ════════════════════════════════════════
     TOAST
════════════════════════════════════════ -->
<div class="toast" id="toast"></div>

<!-- ════════════════════════════════════════
     HIDDEN FILE INPUTS
════════════════════════════════════════ -->
<input type="file" id="file-img" accept="image/*" style="display:none">
<input type="file" id="file-bita" accept="image/*" style="display:none">

<!-- ════════════════════════════════════════
     SCREEN: HOME
════════════════════════════════════════ -->
<div class="screen active" id="screen-home">
  <div class="home-hero">
    <div class="hero-robot">🤖</div>
    <div class="hero-name">ALAN'S <span>ROBOT</span> LAB</div>
    <div class="hero-sub">PROYECTO 1 · ROBOT SEGUIDOR DE LÍNEA</div>
    <div class="hero-stats">
      <div class="hero-stat" id="home-stat-steps">0/25 pasos ✓</div>
      <div class="hero-stat" id="home-stat-mod">Módulo 1 activo</div>
    </div>
  </div>
  <div class="role-cards">
    <button class="role-card student" onclick="goKid()">
      <div class="role-icon">👦</div>
      <div>
        <div class="role-title">¡Soy Alan! 🚀</div>
        <div class="role-desc">Ver mis módulos, seguir el instructivo, marcar mis avances y escribir en la bitácora.</div>
      </div>
    </button>
    <button class="role-card parent" onclick="goPin()">
      <div class="role-icon">👨‍👩‍👦</div>
      <div>
        <div class="role-title">Soy el padre / madre</div>
        <div class="role-desc">Subir imágenes a los pasos, desbloquear módulos y ver el progreso de Alan.</div>
      </div>
    </button>
  </div>
</div>

<!-- ════════════════════════════════════════
     SCREEN: PIN
════════════════════════════════════════ -->
<div class="screen" id="screen-pin">
  <div class="topbar">
    <div>
      <div class="topbar-title">ACCESO PADRES 🔒</div>
    </div>
    <button class="topbar-btn" onclick="showScreen('home')">← Volver</button>
  </div>
  <div class="pin-screen">

function showScreen(id) {

}

function showLoading(msg) {
  document.getElementById('loading').style.display = 'flex';
  document.querySelector('.loading-text').textContent = msg || 'Cargando...';
}

function hideLoading() {
  document.getElementById('loading').style.display = 'none';

function showToast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast ' + type + ' show';
  setTimeout(() => t.classList.remove('show'), 2800);
}

function compressImage(file, maxW=800, quality=0.72) {
  return new Promise(resolve => {
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        const scale = Math.min(1, maxW / img.width);
        const c = document.createElement('canvas');
        c.width = img.width * scale;
        c.height = img.height * scale;
        c.getContext('2d').drawImage(img, 0, 0, c.width, c.height);
        resolve(c.toDataURL('image/jpeg', quality));
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

function stepDone(modId, n) { return !!state.progress[`${modId}_${n}`]; }
function modComplete(m) { return m.pasos.every(p => stepDone(m.id, p.n)); }
function totalDone() { return Object.values(state.progress).filter(Boolean).length; }
function totalSteps() { return MODS.reduce((a,m) => a + m.pasos.length, 0); }
function unlockedMods() { return MODS.filter(m => m.id <= state.unlocked); }
function modColor(id) { return MOD_COLORS[id-1] || '#F97316'; }
function modBg(id) { return MOD_BG[id-1] || '#FFF3E9'; }

  const res = await fetch(GAS_URL + '?action=getAll&t=' + Date.now());
  const data = await res.json();
  if (data.progress) state.progress = data.progress;
  if (data.unlocked !== undefined) state.unlocked = data.unlocked;
  if (data.images) state.images = data.images;
  if (data.bitacora) state.bitacora = data.bitacora;
}

async function apiPost(body) {
  await fetch(GAS_URL, {
    method: 'POST',
    body: JSON.stringify(body),
  });
}

async function goKid() {

}

function goPin() {
  pinValue = '';
  updatePinDisplay();
  document.getElementById('pin-error').classList.add('hidden');
  showScreen('pin');
}

async function goParent() {
  showLoading('Cargando panel de padres...');

}

// ╔════════════════════════════════════════╗
// ║  PIN                                  ║
// ╚════════════════════════════════════════╝
function pinKey(k) {
  if (pinValue.length >= 4) return;
  pinValue += k;
  updatePinDisplay();
  if (pinValue.length === 4) {
    if (pinValue === PARENT_PIN) {
      setTimeout(() => goParent(), 200);
    } else {
      document.querySelectorAll('.pin-dot').forEach(d => d.classList.add('error'));
      document.getElementById('pin-error').classList.remove('hidden');
      setTimeout(() => {
        pinValue = '';
        updatePinDisplay();
        document.querySelectorAll('.pin-dot').forEach(d => d.classList.remove('error'));
      }, 700);
    }
  }
}

function pinDel() {
  pinValue = pinValue.slice(0, -1);
  updatePinDisplay();
  document.getElementById('pin-error').classList.add('hidden');
}

function updatePinDisplay() {
  for (let i = 0; i < 4; i++) {
    const dot = document.getElementById('pd' + i);
    dot.textContent = pinValue[i] ? '●' : '';
    dot.classList.toggle('filled', !!pinValue[i]);
  }
}

// ║  KID VIEW                             ║
// ╚════════════════════════════════════════╝
function kidSectionTab(tab) {
  kidActiveSection = tab;
  document.getElementById('stab-mod').classList.toggle('active', tab === 'mod');
  document.getElementById('stab-bita').classList.toggle('active', tab === 'bita');
  document.getElementById('kid-mod-content').classList.toggle('hidden', tab !== 'mod');
  document.getElementById('kid-bita-content').classList.toggle('hidden', tab !== 'bita');
  document.getElementById('kid-mod-tabs').classList.toggle('hidden', tab !== 'mod');
  if (tab === 'bita') renderKidBita();
}

function renderKid() {
  const mods = unlockedMods();
  if (!mods.length) return;
  const mod = mods[Math.min(kidActiveMod, mods.length - 1)];

  // Topbar
  document.getElementById('kid-topbar-title').textContent = mod.emoji + ' ' + mod.title;
  const done = mod.pasos.filter(p => stepDone(mod.id, p.n)).length;
  document.getElementById('kid-topbar-sub').textContent = `${done}/${mod.pasos.length} pasos · ${mod.tiempo}`;
  const pct = (totalDone() / totalSteps()) * 100;
  document.getElementById('kid-progress-fill').style.width = pct + '%';

  // Module tabs
  const tabsEl = document.getElementById('kid-mod-tabs');
  tabsEl.innerHTML = '';
  mods.forEach((m, i) => {
    const d = m.pasos.filter(p => stepDone(m.id, p.n)).length;
    const btn = document.createElement('button');
    btn.className = 'mod-tab' + (i === kidActiveMod ? ' active' : '');
    btn.style.setProperty('--c', modColor(m.id));
    btn.innerHTML = `<span class="tab-emoji">${m.emoji}</span>Mód ${m.id}<span class="tab-count" style="color:${d===m.pasos.length?'#059669':'#9CA3AF'}">${d===m.pasos.length?'✅':d+'/'+m.pasos.length}</span>`;
    btn.onclick = () => { kidActiveMod = i; renderKid(); kidSectionTab('mod'); };
    tabsEl.appendChild(btn);
  });
  // Add locked next module
  if (state.unlocked < 6) {
    const next = MODS[state.unlocked];
    const lockBtn = document.createElement('div');
    lockBtn.className = 'mod-tab locked';
    lockBtn.innerHTML = `<span class="tab-lock">🔒</span>Mód ${next.id}<span class="tab-count">bloqueado</span>`;
    tabsEl.appendChild(lockBtn);
  }

  // Steps content
  const content = document.getElementById('kid-mod-content');
  let html = '<div class="page-body">';

  // Materials
  html += `<div><div class="section-title">📦 Materiales para este módulo</div>
    <div class="chip-row">${mod.materiales.map(m2=>`<span class="chip">${m2}</span>`).join('')}</div></div>`;

  // Warning
  if (mod.warn) html += `<div class="warn-box">${mod.warn}</div>`;

  // Steps
  mod.pasos.forEach(paso => {
    const done = stepDone(mod.id, paso.n);
    const imgUrl = state.images[`${mod.id}_${paso.n}`];
    html += `
    <div class="card" id="step-card-${mod.id}-${paso.n}">
      <div class="card-head${done?' done':''}">
        <div class="step-circle${done?' done':''}" style="${!done?'border-color:'+modColor(mod.id)+';color:'+modColor(mod.id)+';background:'+modBg(mod.id):''}">${done?'✓':paso.n}</div>
        <div style="flex:1">
          <div class="step-label" style="color:${modColor(mod.id)}">PASO ${paso.n}</div>
          <div class="step-title${done?' done':''}" style="${done?'color:'+modColor(mod.id):''}">${paso.titulo}</div>
        </div>
      </div>
      <div class="card-body">
        <div class="step-text">${paso.texto}</div>
        <div class="img-slot">
          ${imgUrl ? `<img src="${imgUrl}" alt="Imagen paso ${paso.n}">` : `<div class="img-placeholder"><div class="ph-icon">🖼️</div><p>Imagen pendiente — papá o mamá la subirá aquí</p></div>`}
        </div>
        <div class="tip-box"><span>💡</span><span>${paso.tip}</span></div>
        <div class="action-box"><span>🎯</span><span>${paso.accion}</span></div>
        <button class="btn ${done?'btn-done':'btn-orange'}" onclick="toggleStep(${mod.id},${paso.n})">
          ${done?'✅ ¡Paso '+paso.n+' completado!':'⬜ Marcar paso '+paso.n+' como listo'}
        </button>
      </div>
    </div>`;
  });

  // Completion banner
  if (modComplete(mod)) {
    html += `<div class="completion-banner">
      <div class="cb-emoji">🎉</div>
      <h3>¡Módulo ${mod.id} completado!</h3>
      <p>${mod.id < 6 ? 'Avísale a papá o mamá para que revisen tu bitácora y desbloqueen el Módulo '+(mod.id+1)+' 🔓' : '🏆 ¡PROYECTO 1 COMPLETADO! ¡Eres un verdadero robotista, Alan!'}</p>
    </div>`;
  }

  // Refresh button
  html += `<button class="btn btn-ghost" onclick="refreshKid()">🔄 Actualizar imágenes</button>`;
  html += '</div>';
  content.innerHTML = html;

  // Home stats
  document.getElementById('home-stat-steps').innerHTML = `<b>${totalDone()}/${totalSteps()}</b> pasos ✓`;
  document.getElementById('home-stat-mod').innerHTML = `Módulo <b>${state.unlocked}</b> activo`;
}

async function toggleStep(modId, n) {
  const key = `${modId}_${n}`;
  state.progress[key] = !state.progress[key];
  renderKid();
  try {
    await apiPost({ action: 'toggleStep', key, value: state.progress[key] });
    showToast(state.progress[key] ? '✅ ¡Paso completado!' : '↩️ Paso desmarcado', state.progress[key] ? 'green' : '');
  } catch(e) { showToast('Sin conexión — se guardará luego', 'red'); }
}

async function refreshKid() {
  showLoading('Actualizando imágenes...');
  try { await apiGet(); renderKid(); showToast('✅ Actualizado'); }
  catch(e) { showToast('Error al actualizar', 'red'); }
  finally { hideLoading(); }
}

function renderKidBita() {
  const mods = unlockedMods();
  const content = document.getElementById('kid-bita-content');
  let html = '<div class="page-body">';

  // Form
  html += `<div class="bita-form">
    <div class="bita-form-head">✏️ NUEVA ENTRADA DE BITÁCORA</div>
    <div class="bita-form-body">
      <div class="field-label">MÓDULO</div>
      <select class="field-input" id="bita-mod">

        ${MOODS.map(m=>`<button class="mood-btn" onclick="selectMood('${m}')">${m}</button>`).join('')}
      </div>
      <button class="btn btn-orange" onclick="saveBitaEntry()">✅ GUARDAR EN MI BITÁCORA</button>
    </div>
  </div>`;

  // Previous entries
  html += `<div class="section-title">📋 MIS ENTRADAS ANTERIORES (${state.bitacora.length})</div>`;
  if (state.bitacora.length === 0) {
    html += `<div class="card" style="padding:24px;text-align:center;color:var(--text-s)">📭 Aún no tienes entradas. ¡Agrega tu primer avance!</div>`;
  } else {
    state.bitacora.forEach(e => {
      const c = modColor(e.modId);
      const bg = modBg(e.modId);
      html += `<div class="bita-entry">
        <div class="bita-entry-head">
          <span class="bita-mod-tag" style="background:${bg};color:${c}">${MODS[e.modId-1]?.emoji} Módulo ${e.modId}</span>

      </div>`;

function selectMood(m) {
  bitaMood = (bitaMood === m) ? '' : m;
  document.querySelectorAll('.mood-btn').forEach(b => {
    b.classList.toggle('selected', b.textContent === bitaMood);
  });
}

async function saveBitaEntry() {
  const title = document.getElementById('bita-title').value.trim();
  if (!title) { showToast('Escribe un título para tu avance 👆', 'red'); return; }
  const modId = parseInt(document.getElementById('bita-mod').value);
  const note = document.getElementById('bita-note').value.trim();
  const entry = {
    id: Date.now(), modId, title,
    photo: bitaPhoto || null,
    note, mood: bitaMood,
    date: new Date().toLocaleDateString('es-MX', {day:'numeric',month:'long',year:'numeric'})
  };
  state.bitacora.unshift(entry);
  showLoading('Guardando en la bitácora...');
  try {
    await apiPost({ action: 'addBitaEntry', entry });
    bitaPhoto = null; bitaMood = '';
    renderKidBita();
    showToast('✅ ¡Guardado en la bitácora!', 'green');
  } catch(e) { showToast('Error al guardar', 'red'); }
  finally { hideLoading(); }
}

// ║  PARENT VIEW                          ║
// ╚════════════════════════════════════════╝
function parentTab(tab) {
  parentActiveTab = tab;
  document.querySelectorAll('.parent-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('ptab-' + tab).classList.add('active');
  const modTabs = document.getElementById('parent-mod-tabs');
  modTabs.classList.toggle('hidden', tab !== 'images');
  if (tab === 'images') renderParentModTabs();
  renderParentContent();
}

function renderParentModTabs() {
  const el = document.getElementById('parent-mod-tabs');
  el.innerHTML = '';
  MODS.forEach((m, i) => {
    const cnt = m.pasos.filter(p => state.images[`${m.id}_${p.n}`]).length;
    const btn = document.createElement('button');
    btn.className = 'mod-tab' + (i === parentActiveMod ? ' active' : '');
    btn.innerHTML = `<span class="tab-emoji">${m.emoji}</span>Mód ${m.id}<span class="tab-count" style="color:${cnt===m.pasos.length?'#059669':'#9CA3AF'}">${cnt}/${m.pasos.length} 🖼️</span>`;
    btn.onclick = () => { parentActiveMod = i; renderParentModTabs(); renderParentContent(); };
    el.appendChild(btn);
  });
}

function renderParentContent() {
  const content = document.getElementById('parent-content');
  if (parentActiveTab === 'unlock') content.innerHTML = renderUnlock();
  else if (parentActiveTab === 'images') content.innerHTML = renderParentImages();
  else if (parentActiveTab === 'progress') content.innerHTML = renderProgress();
  else if (parentActiveTab === 'bita') content.innerHTML = renderParentBita();
}

function renderUnlock() {
  let html = '<div class="page-body">';
  html += `<div class="info-box">💡 <strong>Cómo funciona:</strong> Alan solo puede ver el módulo actualmente activo. Cuando lo termine y anote su avance en la bitácora, tú lo revisas y desbloqueas el siguiente.</div>`;
  html += `<div class="section-title" style="margin-top:4px">MÓDULO ACTIVO AHORA: Módulo ${state.unlocked}</div>`;
  MODS.forEach(m => {
    const done = modComplete(m);
    const isActive = m.id === state.unlocked;
    const isLocked = m.id > state.unlocked;
    const stepsD = m.pasos.filter(p => stepDone(m.id, p.n)).length;
    html += `<div class="unlock-card${isActive?' active-mod':done&&!isActive?' done-mod':''}">
      <div class="uc-info">
        <div class="uc-badge" style="color:${modColor(m.id)}">${m.emoji} MÓDULO ${m.id}</div>
        <div class="uc-title">${m.title}</div>
        <div class="uc-progress">${stepsD}/${m.pasos.length} pasos completados</div>
        <div class="prog-bar-wrap" style="width:140px">
          <div class="prog-bar-track"><div class="prog-bar-fill" style="width:${(stepsD/m.pasos.length)*100}%;background:${modColor(m.id)}"></div></div>
        </div>
      </div>
      <div class="uc-btn" style="display:flex;flex-direction:column;gap:6px;align-items:flex-end">
        ${isActive ? `<span class="active-tag">✓ ACTIVO</span>` : ''}
        ${isActive && m.id > 1 ? `<button class="btn btn-danger btn-sm" onclick="doRelock(${m.id})">🔒 Volver a bloquear</button>` : ''}
        ${done && !isActive ? `<span class="done-tag">✅ LISTO</span>` : ''}
        ${isLocked && m.id === state.unlocked + 1 ? `<button class="btn btn-navy btn-sm" onclick="doUnlock(${m.id})">🔓 Desbloquear</button>` : ''}
        ${isLocked && m.id > state.unlocked + 1 ? `<span class="locked-tag">🔒 Bloqueado</span>` : ''}
      </div>
    </div>`;
  });
  html += `<button class="btn btn-ghost" onclick="refreshParent()">🔄 Actualizar datos</button>`;
  html += '</div>';
  return html;
}

async function doUnlock(modId) {
  state.unlocked = modId;
  showLoading('Desbloqueando módulo...');
  try {
    await apiPost({ action: 'unlock', modId });
    renderParentContent();
    showToast(`🔓 ¡Módulo ${modId} desbloqueado para Alan!`, 'orange');
  } catch(e) { showToast('Error al desbloquear', 'red'); }
  finally { hideLoading(); }
}

async function doRelock(modId) {
  if (!confirm(`¿Volver a bloquear el Módulo ${modId}?\n\nAlan ya no podrá verlo hasta que lo desbloquees de nuevo.\n\nSus respuestas y avances guardados NO se borran.`)) return;
  const prevMod = modId - 1;
  state.unlocked = prevMod;
  showLoading('Bloqueando módulo...');
  try {
    await apiPost({ action: 'unlock', modId: prevMod });
    renderParentContent();
    showToast(`🔒 Módulo ${modId} bloqueado. Activo: Módulo ${prevMod}`, 'red');
  } catch(e) { showToast('Error al bloquear', 'red'); }
  finally { hideLoading(); }
}

function renderParentImages() {
  const mod = MODS[parentActiveMod];
  let html = '<div class="page-body">';
  html += `<div class="section-title">${mod.emoji} Módulo ${mod.id} — ${mod.title}</div>`;
  mod.pasos.forEach(paso => {
    const key = `${mod.id}_${paso.n}`;
    const img = state.images[key];
    html += `<div class="card">
      <div class="card-head" style="background:${img?modBg(mod.id):''}">
        <div class="step-circle" style="border-color:${modColor(mod.id)};color:${modColor(mod.id)};background:${modBg(mod.id)}">${paso.n}</div>
        <div>
          <div class="step-label" style="color:${modColor(mod.id)}">PASO ${paso.n}</div>
          <div class="step-title">${paso.titulo}</div>

            <button class="btn btn-danger btn-sm" onclick="deleteImg('${key}')">🗑️ Borrar</button>

function triggerImgUpload(key) {
  uploadKey = key;
  document.getElementById('file-img').click();
}

async function deleteImg(key) {
  if (!confirm('¿Borrar esta imagen?')) return;
  delete state.images[key];
  renderParentContent();
  try { await apiPost({ action: 'deleteImage', key }); showToast('🗑️ Imagen borrada'); }
  catch(e) { showToast('Error al borrar', 'red'); }
}

function renderProgress() {
  const done = totalDone(), total = totalSteps();
  let html = '<div class="page-body">';
  html += `<div class="stats-card">
    <div class="stats-number">${done}<span style="font-size:20px;opacity:.5">/${total}</span></div>
    <div class="stats-label">pasos completados por Alan</div>
    <div class="prog-bar-wrap" style="margin-top:12px">
      <div class="prog-bar-track" style="height:8px"><div class="prog-bar-fill" style="width:${(done/total)*100}%;background:var(--orange);height:8px"></div></div>
    </div>

  </div>`;

    const d = m.pasos.filter(p => stepDone(m.id, p.n)).length;

    html += `<div class="card" style="opacity:${locked?'.4':'1'}">

        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
          <div>
            <div style="font-weight:800;font-size:13px;color:${locked?'#9CA3AF':modColor(m.id)}">${m.emoji} Módulo ${m.id} ${locked?'🔒':''}</div>
            <div style="font-size:11px;color:var(--text-s)">${m.title}</div>
          </div>
          <div style="text-align:right">
            <div style="font-weight:900;font-size:16px;color:${modColor(m.id)}">${d}/${t}</div>
            ${d===t?`<div style="font-size:10px;color:#059669;font-weight:800">✅ COMPLETO</div>`:''}
          </div>
        </div>
        <div class="prog-bar-track"><div class="prog-bar-fill" style="width:${(d/t)*100}%;background:${modColor(m.id)}"></div></div>
        <div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:8px">
          ${m.pasos.map(p=>`<span style="font-size:9px;padding:3px 8px;border-radius:12px;background:${stepDone(m.id,p.n)?modBg(m.id):'#F3F4F6'};color:${stepDone(m.id,p.n)?modColor(m.id):'#9CA3AF'};font-weight:800;border:1px solid ${stepDone(m.id,p.n)?modColor(m.id)+'40':'#E5E7EB'}">P${p.n} ${stepDone(m.id,p.n)?'✓':''}</span>`).join('')}

      </div>
    </div>`;
  });
  html += `<button class="btn btn-ghost" onclick="refreshParent()">🔄 Actualizar datos</button>`;
  html += '</div>';
  return html;
}

        <div class="bita-entry-title">${e.title}</div>

  try { await apiGet(); renderParentContent(); if(parentActiveTab==='images') renderParentModTabs(); showToast('✅ Datos actualizados', 'green'); }

  finally { hideLoading(); }
}

// ╔════════════════════════════════════════╗
// ║  FILE UPLOAD HANDLERS                 ║
// ╚════════════════════════════════════════╝
document.getElementById('file-img').addEventListener('change', async function(e) {
  const file = e.target.files[0];
  if (!file || !uploadKey) return;
  showLoading('Comprimiendo y subiendo imagen...');
  try {
    const b64 = await compressImage(file, 800, 0.72);
    await apiPost({ action: 'saveImage', key: uploadKey, imageBase64: b64 });
    state.images[uploadKey] = b64;
    renderParentContent();
    renderParentModTabs();
    showToast('✅ ¡Imagen subida!', 'green');
  } catch(e2) { showToast('Error al subir imagen', 'red'); }
  finally { hideLoading(); uploadKey = null; e.target.value = ''; }
});

document.getElementById('file-bita').addEventListener('change', async function(e) {
  const file = e.target.files[0];
  if (!file) return;
  const b64 = await compressImage(file, 900, 0.75);
  bitaPhoto = b64;
  document.getElementById('bita-photo-area').innerHTML = `
    <div style="position:relative;margin-bottom:14px">
      <img src="${b64}" style="width:100%;border-radius:8px;display:block;">
      <button onclick="clearBitaPhoto()" style="position:absolute;top:8px;right:8px;background:rgba(0,0,0,.6);border:none;border-radius:16px;color:#fff;padding:5px 12px;font-size:11px;cursor:pointer">✕ Quitar</button>
    </div>`;
  e.target.value = '';
});

function clearBitaPhoto() {
  bitaPhoto = null;
  document.getElementById('bita-photo-area').innerHTML = `
    <div class="photo-drop" onclick="document.getElementById('file-bita').click()">
      <div class="pd-icon">📷</div>
      <p>Toca para agregar una foto desde tu galería</p>
    </div>`;
}

// ╔════════════════════════════════════════╗
// ║  INIT                                 ║
// ╚════════════════════════════════════════╝
(async function init() {
  try { await apiGet(); } catch(e) { console.warn('Offline start'); }
  hideLoading();
  document.getElementById('home-stat-steps').innerHTML = `<b>${totalDone()}/${totalSteps()}</b> pasos ✓`;
  document.getElementById('home-stat-mod').innerHTML = `Módulo <b>${state.unlocked}</b> activo`;
})();
</script>
